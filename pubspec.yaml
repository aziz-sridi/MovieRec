name: movierec
description: A movie recommendation and discovery app with purple theme

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  
  # State Management
  provider: ^6.1.1
  
  # Navigation
  go_router: ^13.0.0
  
  # Animations
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  
  # UI Components
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  
  # Utils
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
